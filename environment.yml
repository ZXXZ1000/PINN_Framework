# PINN_Framework/environment.yml
name: pinn-framework-env
channels:
  - conda-forge
  - pytorch
  - nodefaults
dependencies:
  # Core Python and PyTorch
  - python=3.11
  - pip
  - pytorch

  # Scientific computing and data processing
  - numpy
  - scipy
  - pandas

  # Fastscape/xsimlab data generation
  - xarray
  - dask
  - distributed
  - xsimlab
  - fastscape

  # Visualization
  - matplotlib
  - pillow

  # Utilities
  - pyyaml
  - tqdm
  - tensorboard
  - omegaconf
  - netcdf4
  - scikit-image

  # Development/test tools
  - pip:
    - pytest>=7.0.0
    - pytest-mock>=3.10.0
    - pytest-cov>=4.1.0
